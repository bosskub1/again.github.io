<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ยินดีต้อนรับสู่เว็บไซต์ของฉัน</title>
    <style>
        /* สไตล์พื้นฐาน */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 400px;
            width: 90%;
        }
        h1 { margin-bottom: 0.5rem; font-size: 2.5rem; }
        p { font-size: 1.1rem; opacity: 0.9; }
        .btn {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 10px 25px;
            background: #fff;
            color: #764ba2;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>สวัสดี! 👋</h1>
        <p>นี่คือเว็บไซต์แรกของฉันบน <b>GitHub Pages</b></p>
        <p>กำลังอยู่ในช่วงพัฒนาครับ</p>
        <a href="https://github.com" class="btn">ไปที่ GitHub ของฉัน</a>
    </div>

</body>
</html>
